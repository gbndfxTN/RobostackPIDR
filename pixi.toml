[workspace]
authors = ["CougnetDefaux Gabin <gabin.cougnet-defaux@telecomnancy.eu>"]
# On fusionne les canaux ici pour que tout soit accessible directement
channels = ["https://prefix.dev/conda-forge", "https://prefix.dev/robostack-humble"]
name = "robostack"
platforms = ["osx-arm64"]
version = "0.1.0"

# Activation automatique du workspace ROS
[target.unix.activation]
scripts = ["install/setup.bash"]
env = { RMW_IMPLEMENTATION = "rmw_cyclonedds_cpp", ROS_LOCALHOST_ONLY = "1", GAZEBO_IP = "127.0.0.1", GZ_IP = "127.0.0.1", IGN_IP = "127.0.0.1" }

# Définition de la tâche de compilation globale
[tasks]
build = "colcon build --symlink-install --cmake-args -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DPython_FIND_VIRTUALENV=ONLY -DPython3_FIND_VIRTUALENV=ONLY"
go2 = "ros2 launch go2_config gazebo.launch.py"
go2-rviz = "ros2 launch go2_config gazebo.launch.py rviz:=true"
go2-clean = "pkill -f 'ros2 launch go2_config gazebo.launch.py'; pkill -f gzserver; pkill -f gzclient; pkill -f spawn_entity.py; pkill -f quadruped_controller_node; pkill -f state_estimation_node; pkill -f robot_state_publisher"
path-teleop = "ros2 run semantic_path_teleop semantic_path_teleop --ros-args -p path_file:=outputs/go2_ros_tracking_minimal/semantic_path.json -p cmd_vel_topic:=/cmd_vel -p odom_topic:=/odom/ground_truth"
path-markers = "ros2 run semantic_path_teleop spawn_path_markers --ros-args -p path_file:=outputs/go2_ros_tracking_minimal/semantic_path.json -p stride:=3"
path-teleop-dry = "ros2 run semantic_path_teleop semantic_path_teleop --ros-args -p path_file:=outputs/go2_ros_tracking_minimal/semantic_path.json -p cmd_vel_topic:=/cmd_vel -p dry_run:=true"

[dependencies]
python = "*"
# Outils de compilation
compilers = "*"
cmake = "*"
pkg-config = "*"
make = "*"
ninja = "*"
# Outils spécifiques à ROS
rosdep = "*"
colcon-common-extensions = "*"
# ROS 2 Humble est maintenant une dépendance directe
ros-humble-desktop = "*"
# Intégration Gazebo
ros-humble-ros-gz = "*"
gazebo = "*"
# --- NOUVEAUTÉS : Navigation et Cartographie ---
# Le serveur qui convertit les nuages de points 3D en voxels
ros-humble-octomap-server = "*"
# Pour visualiser la carte 3D dans l'interface Rviz2
ros-humble-octomap-rviz-plugins = "*"
# Le framework complet pour bras robotiques (inclut OMPL en interne)
ros-humble-moveit = "*"
ros-humble-xacro = "*"
ros-humble-joint-state-publisher = "*"
ros-humble-robot-state-publisher = "*"
ros-humble-rviz2 = "*"
# --- DEPENDANCES MANQUANTES POUR LE GO2 ET CHAMP ---
# Remplacement de Harmonic par Gazebo Classic
ros-humble-gazebo-ros-pkgs = "*"
ros-humble-gazebo-ros2-control = "*"
# Contrôleurs du robot (pour plier les pattes)
ros-humble-ros2-control = "*"
ros-humble-ros2-controllers = "*"
# L'interface graphique pour bouger les pattes à la souris
ros-humble-joint-state-publisher-gui = "*"
# Outils de localisation et navigation
ros-humble-robot-localization = "*"
ros-humble-nav2-bringup = "*"
# Le fameux capteur LiDAR 3D !
ros-humble-velodyne-gazebo-plugins = "*"
ros-humble-velodyne-description = "*"
ros-humble-velodyne-simulator = "*"
ros-humble-rmw-cyclonedds-cpp = "*"
